inherits: configs/default.yaml

run:
  name: modernbert-large-hotpotqa-qasper

datasets:
  pretrain:
    name: hotpotqa
    split: train
  adapt:
    name: qasper
    split: train
  eval:
    - name: hotpotqa
      split: validation
    - name: qasper
      split: validation

training:
  model_name: answerdotai/ModernBERT-large
  epochs: 2
  learning_rate: 0.00002
  weight_decay: 0.01
  warmup_ratio: 0.06
  effective_batch_size: 128
  max_grad_norm: 1.0
  precision: bf16
  losses:
    bce_weight: 1.0
    ranking_weight: 0.5
    margin: 0.2
  negatives:
    bm25_hard_per_positive: 4
    random_per_positive: 4
