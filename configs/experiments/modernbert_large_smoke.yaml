inherits: configs/default.yaml

run:
  name: modernbert-large-smoke

training:
  model_name: answerdotai/ModernBERT-large
  sequence_length: 512
  query_max_tokens: 96
  epochs: 1
  effective_batch_size: 128
  max_grad_norm: 1.0
  learning_rate: 0.00002
  weight_decay: 0.01
  warmup_ratio: 0.06
  precision: bf16
  losses:
    bce_weight: 1.0
    ranking_weight: 0.5
    margin: 0.2
